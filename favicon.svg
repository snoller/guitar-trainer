<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#141210"/>
  <g transform="translate(32,32)">
    <!-- Guitar body outline -->
    <ellipse cx="0" cy="8" rx="14" ry="16" fill="none" stroke="#d4a04a" stroke-width="2.5"/>
    <ellipse cx="0" cy="-4" rx="10" ry="11" fill="none" stroke="#d4a04a" stroke-width="2"/>
    <!-- Sound hole -->
    <circle cx="0" cy="10" r="5" fill="none" stroke="#8a6a30" stroke-width="1.5"/>
    <!-- Neck -->
    <rect x="-3" y="-28" width="6" height="18" rx="1.5" fill="none" stroke="#d4a04a" stroke-width="2"/>
    <!-- Headstock -->
    <rect x="-4.5" y="-32" width="9" height="5" rx="2" fill="#d4a04a"/>
    <!-- Strings -->
    <line x1="-2" y1="-28" x2="-2" y2="22" stroke="#f0c060" stroke-width="0.6" opacity="0.6"/>
    <line x1="0" y1="-28" x2="0" y2="22" stroke="#f0c060" stroke-width="0.6" opacity="0.6"/>
    <line x1="2" y1="-28" x2="2" y2="22" stroke="#f0c060" stroke-width="0.6" opacity="0.6"/>
  </g>
</svg>
